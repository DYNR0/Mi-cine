<!DOCTYPE html>
<html>
<head>
  <title>Mi Cine</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .peliculas {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pelicula {
      margin: 15px;
    }

    img {
      width: 200px;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px;
      cursor: pointer;
    }

    #player {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>🎬 MI CINE</h1>

<div class="peliculas">

  <div class="pelicula">
    <img src="https://via.placeholder.com/200x300">
    <br>
    <button onclick="ver('https://www.youtube.com/embed/dQw4w9WgXcQ')">
      Ver
    </button>
  </div>

</div>

<div id="player"></div>

<script>
function ver(link) {
  document.getElementById("player").innerHTML =
    `<iframe width="800" height="450" src="${link}" frameborder="0" allowfullscreen></iframe>`;
}
</script>

</body>
</html>
